name: Build and Release

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  build-and-release:
    if: contains(github.event.head_commit.message, 'Prepare for release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Fetch Spiral Knights version
        id: fetch-version
        run: |
          # Download getdown.txt to get the version
          curl -sSL https://gamemedia2.spiralknights.com/spiral/latest/getdown.txt -o getdown.txt

          # Extract version number from the first line
          VERSION=$(grep '^version = ' getdown.txt | head -1 | sed 's/version = //')
          echo "SK_VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Spiral Knights version: $VERSION"

          # Clean up
          rm getdown.txt

      - name: Cache projectx-pcode.jar
        id: cache-projectx
        uses: actions/cache@v5
        with:
          path: lib/projectx-pcode.jar
          key: projectx-pcode-${{ steps.fetch-version.outputs.version }}

      - name: Download projectx-pcode.jar
        if: steps.cache-projectx.outputs.cache-hit != 'true'
        run: |
          # Construct the URL using the version
          JAR_URL="http://gamemedia2.spiralknights.com/spiral/${{ steps.fetch-version.outputs.version }}/code/projectx-pcode.jar"

          echo "Downloading from: $JAR_URL"

          # Download the jar file to lib directory
          mkdir -p lib
          curl -sSL "$JAR_URL" -o lib/projectx-pcode.jar

          # Verify the file was downloaded
          if [ -f lib/projectx-pcode.jar ]; then
            echo "Successfully downloaded projectx-pcode.jar"
            ls -lh lib/projectx-pcode.jar
          else
            echo "Failed to download projectx-pcode.jar"
            exit 1
          fi

      - name: Validate Maven dependencies
        run: mvn validate

      - name: Build with Maven
        run: mvn clean package

      - name: Extract version from pom.xml
        id: extract-version
        run: |
          VERSION=$(grep '<version>' pom.xml | head -1 | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          VERSION=${VERSION%-SNAPSHOT}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      #- name: Create README.txt
      #  run: |
      #    cat > README.txt << 'EOF'
      #    TODO
      #    EOF

      - name: Create ZIP archive
        run: zip -j "datdec-${{ steps.extract-version.outputs.version }}.zip" target/datdec.jar #README.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract-version.outputs.version }}
          name: datdec ${{ steps.extract-version.outputs.version }}
          draft: false
          prerelease: false
          files: datdec-${{ steps.extract-version.outputs.version }}.zip